name: Publish the website
on:
  workflow_dispatch:
  push:
    branches:
      - "!*"
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  publish-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        name: Checkout code
        with:
          fetch-depth: 0 # fetch all commits and branches for mike to work properly
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        name: Set up Java 17
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        name: Set up Python
        with:
          python-version-file: "pyproject.toml"
      - name: Tools setup
        run: |
          git config --global user.name "SmallRye CI"
          git config --global user.email "smallrye@googlegroups.com"
      - name: Build local artifacts
        run: ./mvnw -s .build/maven-ci-settings.xml -B install -DskipTests
      - name: Render docs and publish
        run: .build/render-documentation.sh